# PRISM — OPTIONAL production stack: pulls prebuilt images from GitHub Container
# Registry instead of building from source. For the standard build-from-source
# flow, use docker-compose.yml instead (the only file most setups need).
#
# Migrations run automatically on backend startup. Usage:
#   cp .env.example .env
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-prism}
      MARIADB_USER: ${DB_USER:-prism}
      MARIADB_PASSWORD: ${DB_PASSWORD:-changeme}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootchangeme}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/stevy2191/prism-backend:latest
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mariadb
      PORT: 3001
    volumes:
      - uploads_data:/uploads

  frontend:
    image: ghcr.io/stevy2191/prism-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mariadb_data:
  uploads_data:
