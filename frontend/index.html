<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRISM</title>
    <script>
      // Apply the saved light/dark/system preference before paint, via the
      // data-theme attribute, to avoid a flash of the wrong base theme.
      // Falls back to "light" — the app's default — if nothing is stored.
      (function () {
        try {
          var t = localStorage.getItem('prism.theme') || 'light';
          var resolved = t === 'dark' || t === 'light'
            ? t
            : ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();

      // Layer the cached admin custom theme (Settings -> Appearance) on top
      // of whichever base theme was just applied above — but only when the
      // admin has actually saved one (theme.mode === 'custom'); otherwise
      // every page follows the viewer's own light/dark/system preference
      // with no override. The real fetch (GET /settings/public) happens
      // after React mounts, so without this the page would flash the base
      // theme's defaults first. This only overrides the --color-* variables
      // (and --brand-primary-rgb, which mirrors --color-accent for
      // Tailwind's bg-prism/text-prism classes); it never touches
      // --navy-*/--surface, which stay owned by the light/dark base theme
      // above.
      (function () {
        try {
          var cached = localStorage.getItem('prism.theme.cache');
          if (!cached) return;
          var theme = JSON.parse(cached);
          if (theme.mode !== 'custom') return;
          var root = document.documentElement;
          var hexToTriplet = function (hex) {
            var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(String(hex || '').trim());
            return m ? (parseInt(m[1], 16) + ' ' + parseInt(m[2], 16) + ' ' + parseInt(m[3], 16)) : null;
          };
          var set = function (name, val) { if (val) root.style.setProperty(name, val); };
          set('--color-bg', theme.bg);
          set('--color-sidebar', theme.sidebar);
          set('--color-card', theme.card);
          set('--color-border', theme.border);
          set('--color-accent', theme.accent);
          set('--color-accent-hover', theme.accentHover);
          set('--color-text-primary', theme.textPrimary);
          set('--color-text-secondary', theme.textSecondary);
          set('--color-text-muted', theme.textMuted);
          set('--color-success', theme.success);
          set('--color-warning', theme.warning);
          set('--color-danger', theme.danger);
          set('--color-timer', theme.timer);
          set('--brand-primary-rgb', hexToTriplet(theme.accent));
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-navy-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
