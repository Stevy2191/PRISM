# PRISM — default production stack. Pulls prebuilt images from GitHub Container
# Registry (no build step). This is the only file most deployments need:
#   1. cp .env.example .env   # then fill in your values
#   2. docker compose up -d
# To update later:  docker compose pull && docker compose up -d
#
# Migrations run automatically on backend startup.
# Developers who want to build from source: use docker-compose.dev.yml instead
#   docker compose -f docker-compose.dev.yml up -d --build
services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-prism}
      MARIADB_USER: ${DB_USER:-prism}
      MARIADB_PASSWORD: ${DB_PASSWORD:-changeme}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootchangeme}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/stevy2191/prism-backend:latest
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mariadb
      PORT: 3001
    volumes:
      - uploads_data:/uploads

  frontend:
    image: ghcr.io/stevy2191/prism-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  mariadb_data:
  uploads_data:
