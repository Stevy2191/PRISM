# PRISM — DEVELOPMENT stack. Builds the frontend and backend from source.
#
# Use this when working on the code (no prebuilt images needed):
#   1. cp .env.example .env   # then fill in your values
#   2. docker compose -f docker-compose.dev.yml up -d --build
#
# For a normal production deployment from prebuilt images, use the default
# docker-compose.yml instead.
#
# The backend automatically waits for the database, runs migrations, and starts.
services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-prism}
      MARIADB_USER: ${DB_USER:-prism}
      MARIADB_PASSWORD: ${DB_PASSWORD:-changeme}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootchangeme}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mariadb
      PORT: 3001
    volumes:
      - uploads_data:/uploads
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:80"

volumes:
  mariadb_data:
  uploads_data:
